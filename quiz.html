<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 1 測驗認證｜AI Skill 實作課</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft JhengHei', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #333;
            line-height: 1.7;
        }

        /* ===== 導航列 ===== */
        .top-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
            background: rgba(15, 12, 41, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; height: 48px;
        }
        .nav-title { color: rgba(255,255,255,0.9); font-size: 14px; font-weight: 600; }
        .nav-links { display: flex; gap: 16px; }
        .nav-links a {
            color: rgba(255,255,255,0.6); font-size: 13px; text-decoration: none;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: #ffd700; }

        /* ===== 主容器 ===== */
        .main-container {
            max-width: 800px; margin: 0 auto;
            padding: 80px 20px 60px;
        }

        /* ===== 測驗區 ===== */
        .quiz-section {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 48px 40px;
            backdrop-filter: blur(10px);
        }
        .quiz-header { text-align: center; margin-bottom: 40px; }
        .quiz-header h1 {
            font-size: 32px; color: #fff;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .quiz-header p { color: rgba(255,255,255,0.5); font-size: 14px; margin-top: 8px; }
        .quiz-progress {
            background: rgba(255,255,255,0.08); border-radius: 20px;
            height: 6px; margin-bottom: 32px; overflow: hidden;
        }
        .quiz-progress-bar {
            height: 100%; border-radius: 20px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.4s ease; width: 0%;
        }
        .quiz-question {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px; padding: 28px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        .quiz-question.answered { border-color: rgba(102, 126, 234, 0.3); }
        .quiz-question h4 {
            color: #e0e0ff; font-size: 16px; margin-bottom: 16px;
            display: flex; align-items: flex-start; gap: 10px;
        }
        .q-num {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; min-width: 28px; height: 28px;
            border-radius: 8px; display: flex; align-items: center;
            justify-content: center; font-size: 13px; font-weight: 700;
        }
        .quiz-option {
            display: block; padding: 14px 18px; margin: 8px 0;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; cursor: pointer;
            color: rgba(255,255,255,0.75); font-size: 15px;
            transition: all 0.25s;
        }
        .quiz-option:hover {
            border-color: rgba(102, 126, 234, 0.5);
            background: rgba(102, 126, 234, 0.08);
        }
        .quiz-option.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102,126,234,0.15), rgba(118,75,162,0.15));
            color: #fff;
        }
        .quiz-option.correct {
            border-color: #34d399;
            background: rgba(52, 211, 153, 0.12);
            color: #34d399;
        }
        .quiz-option.wrong {
            border-color: #f87171;
            background: rgba(248, 113, 113, 0.08);
            color: #f87171;
            text-decoration: line-through;
        }

        /* ===== 按鈕 ===== */
        .btn-primary {
            display: inline-block; padding: 16px 48px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; border: none; border-radius: 14px;
            font-size: 17px; font-weight: 600; cursor: pointer;
            transition: all 0.3s; font-family: inherit;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(102,126,234,0.3); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-gold {
            display: inline-block; padding: 16px 48px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e; border: none; border-radius: 14px;
            font-size: 17px; font-weight: 700; cursor: pointer;
            transition: all 0.3s; font-family: inherit;
        }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,215,0,0.35); }
        .btn-green {
            display: inline-block; padding: 14px 36px;
            background: linear-gradient(135deg, #059669, #10b981);
            color: #fff; border: none; border-radius: 14px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: all 0.3s; font-family: inherit;
        }
        .btn-green:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(16,185,129,0.3); }
        .btn-outline {
            display: inline-block; padding: 14px 36px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.7); border-radius: 14px;
            font-size: 15px; cursor: pointer;
            transition: all 0.3s; font-family: inherit;
        }
        .btn-outline:hover { border-color: rgba(255,255,255,0.4); color: #fff; }
        .btn-center { text-align: center; margin-top: 32px; }

        /* ===== 結果區 ===== */
        .result-section {
            text-align: center; padding: 40px 0;
            animation: fadeUp 0.5s ease;
        }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .result-score {
            font-size: 80px; font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .result-pass { color: #34d399; font-size: 22px; font-weight: 600; margin: 16px 0; }
        .result-fail { color: #f87171; font-size: 22px; font-weight: 600; margin: 16px 0; }

        /* ===== 證書表單 ===== */
        .cert-form-section {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px; padding: 48px 40px;
            max-width: 500px; margin: 40px auto;
            animation: fadeUp 0.5s ease;
        }
        .cert-form-section h2 { color: #ffd700; font-size: 22px; text-align: center; margin-bottom: 28px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; color: rgba(255,255,255,0.7);
            font-size: 14px; margin-bottom: 8px; font-weight: 600;
        }
        .form-group input {
            width: 100%; padding: 14px 18px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px; color: #fff;
            font-size: 16px; font-family: inherit; outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus { border-color: #667eea; }
        .form-group input::placeholder { color: rgba(255,255,255,0.25); }

        /* ============================
           專 業 證 書 樣 式（重新設計）
           ============================ */
        .cert-display-section {
            padding: 40px 0; text-align: center;
            animation: fadeUp 0.6s ease;
        }
        .certificate-wrapper {
            display: inline-block;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,215,0,0.1);
            border-radius: 4px;
        }
        .certificate {
            width: 960px; height: 680px;
            position: relative; overflow: hidden;
            background: #fefcf3;
        }

        /* ===== 防偽底紋層（Guilloche 風格）===== */

        /* 第 1 層：奶油漸層底色 */
        .cert-bg-base {
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse at 25% 25%, rgba(255,248,220,0.7) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 75%, rgba(255,239,213,0.6) 0%, transparent 55%),
                linear-gradient(160deg, #fefcf3 0%, #fdf6e3 30%, #fef9ef 60%, #fefcf3 100%);
        }

        /* 第 2 層：Guilloche 細線交織紋（多角度重疊） */
        .cert-guilloche {
            position: absolute; inset: 0; pointer-events: none;
            background:
                /* 波紋 A：15° 細線 */
                repeating-linear-gradient(15deg,
                    transparent, transparent 3px,
                    rgba(184,134,11,0.03) 3px, rgba(184,134,11,0.03) 3.5px,
                    transparent 3.5px, transparent 6.5px),
                /* 波紋 B：-15° 交叉 */
                repeating-linear-gradient(-15deg,
                    transparent, transparent 3px,
                    rgba(184,134,11,0.03) 3px, rgba(184,134,11,0.03) 3.5px,
                    transparent 3.5px, transparent 6.5px),
                /* 波紋 C：75° 斜紋 */
                repeating-linear-gradient(75deg,
                    transparent, transparent 5px,
                    rgba(139,69,19,0.015) 5px, rgba(139,69,19,0.015) 5.5px,
                    transparent 5.5px, transparent 10.5px),
                /* 波紋 D：-75° 交叉 */
                repeating-linear-gradient(-75deg,
                    transparent, transparent 5px,
                    rgba(139,69,19,0.015) 5px, rgba(139,69,19,0.015) 5.5px,
                    transparent 5.5px, transparent 10.5px);
        }

        /* 第 3 層：同心圓漣漪紋（中央浮水印） */
        .cert-rosette {
            position: absolute; inset: 0; pointer-events: none;
            background:
                repeating-radial-gradient(circle at 50% 48%,
                    transparent 0px, transparent 18px,
                    rgba(184,134,11,0.018) 18px, rgba(184,134,11,0.018) 19px,
                    transparent 19px, transparent 37px),
                repeating-radial-gradient(circle at 50% 48%,
                    transparent 0px, transparent 50px,
                    rgba(184,134,11,0.012) 50px, rgba(184,134,11,0.012) 51px,
                    transparent 51px, transparent 101px);
        }

        /* 第 4 層：微文字底紋帶 */
        .cert-microtext {
            position: absolute; inset: 0; pointer-events: none;
            overflow: hidden;
        }
        .cert-microtext::before {
            content: 'CERTIFIED · 倉勳科技學院 · AI SKILL · CERTIFIED · 倉勳科技學院 · AI SKILL · CERTIFIED · 倉勳科技學院 · AI SKILL · CERTIFIED · 倉勳科技學院 · AI SKILL · CERTIFIED · 倉勳科技學院 · AI SKILL · CERTIFIED · 倉勳科技學院 · AI SKILL · CERTIFIED · 倉勳科技學院 · AI SKILL · CERTIFIED · 倉勳科技學院 · AI SKILL · ';
            position: absolute;
            top: 50%; left: -20%; right: -20%;
            transform: rotate(-25deg) translateY(-50%);
            font-size: 7px; letter-spacing: 3px;
            color: rgba(184,134,11,0.045);
            white-space: nowrap;
            line-height: 22px;
            font-family: 'Courier New', monospace;
            font-weight: 700;
        }
        .cert-microtext::after {
            content: 'CERTIFICATE OF ACHIEVEMENT · 能力認證 · VERIFIED · CERTIFICATE OF ACHIEVEMENT · 能力認證 · VERIFIED · CERTIFICATE OF ACHIEVEMENT · 能力認證 · VERIFIED · CERTIFICATE OF ACHIEVEMENT · 能力認證 · VERIFIED · CERTIFICATE OF ACHIEVEMENT · 能力認證 · VERIFIED · ';
            position: absolute;
            top: 60%; left: -20%; right: -20%;
            transform: rotate(-25deg) translateY(-50%);
            font-size: 7px; letter-spacing: 3px;
            color: rgba(184,134,11,0.04);
            white-space: nowrap;
            line-height: 22px;
            font-family: 'Courier New', monospace;
            font-weight: 700;
        }

        /* 第 5 層：邊緣 Guilloche 框紋 */
        .cert-border-pattern {
            position: absolute; inset: 4px; pointer-events: none;
            border: 8px solid transparent;
            border-image: repeating-linear-gradient(
                90deg,
                rgba(184,134,11,0.08) 0px, rgba(184,134,11,0.08) 2px,
                transparent 2px, transparent 4px,
                rgba(218,165,32,0.06) 4px, rgba(218,165,32,0.06) 5px,
                transparent 5px, transparent 8px
            ) 8;
        }

        /* 多層邊框 */
        .cert-border-outer {
            position: absolute; inset: 0;
            border: 3px solid #b8860b;
        }
        .cert-border-inner {
            position: absolute; inset: 14px;
            border: 1.5px solid #daa520;
        }
        .cert-border-deco {
            position: absolute; inset: 20px;
            border: 0.5px solid rgba(184,134,11,0.25);
        }

        /* 四角裝飾 — 更精緻的 SVG */
        .corner-ornament {
            position: absolute; width: 100px; height: 100px;
            opacity: 0.3;
        }
        .corner-ornament svg { width: 100%; height: 100%; }
        .corner-tl { top: 16px; left: 16px; }
        .corner-tr { top: 16px; right: 16px; transform: scaleX(-1); }
        .corner-bl { bottom: 16px; left: 16px; transform: scaleY(-1); }
        .corner-br { bottom: 16px; right: 16px; transform: scale(-1,-1); }

        /* 頂底金色裝飾帶 */
        .cert-top-band {
            position: absolute; top: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(90deg, transparent 0%, #b8860b 15%, #ffd700 50%, #b8860b 85%, transparent 100%);
        }
        .cert-bottom-band {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(90deg, transparent 0%, #b8860b 15%, #ffd700 50%, #b8860b 85%, transparent 100%);
        }

        /* 證書主內容 */
        .cert-content {
            position: relative; z-index: 2;
            padding: 50px 70px 40px;
            height: 100%;
            display: flex; flex-direction: column;
            justify-content: space-between;
        }

        /* 頂部機構名 */
        .cert-issuer-name {
            text-align: center;
            font-size: 13px; letter-spacing: 8px;
            color: #b8860b;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* 證書標題 */
        .cert-title {
            text-align: center; margin: 12px 0 6px;
        }
        .cert-title h1 {
            font-size: 44px; font-weight: 800;
            color: #2c1810;
            letter-spacing: 6px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .cert-title-en {
            font-size: 12px; letter-spacing: 10px;
            color: #b8860b; margin-top: 4px;
            font-weight: 400;
        }
        .cert-title-line {
            width: 200px; height: 1px; margin: 12px auto;
            background: linear-gradient(90deg, transparent, #b8860b, transparent);
        }

        /* 中間主體 */
        .cert-body { text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .cert-preamble { font-size: 15px; color: #666; margin-bottom: 8px; }
        .cert-recipient {
            font-size: 40px; font-weight: 700;
            color: #1a1040;
            margin: 6px 0;
            font-family: 'Microsoft JhengHei', serif;
        }
        .cert-org-name { font-size: 15px; color: #888; margin-bottom: 16px; }
        .cert-congrats {
            font-size: 15px; color: #555; line-height: 2;
            max-width: 500px; margin: 0 auto;
        }
        .cert-course-badge {
            display: inline-block; margin: 18px auto 0;
            padding: 12px 32px;
            background: linear-gradient(135deg, #2c1810, #4a2040);
            color: #ffd700;
            border-radius: 30px;
            font-size: 15px; font-weight: 700;
            letter-spacing: 2px;
            border: 1px solid rgba(255,215,0,0.3);
        }

        /* 證書編號 */
        .cert-number {
            text-align: center;
            font-size: 11px; color: #aaa;
            letter-spacing: 3px;
            margin-top: 12px;
        }

        /* 底部簽名區 */
        .cert-footer {
            display: flex; justify-content: space-between;
            align-items: flex-end;
            padding-top: 16px;
        }
        .cert-footer-item { text-align: center; min-width: 180px; }
        .cert-footer-value {
            font-size: 15px; color: #333;
            font-weight: 600; margin-bottom: 6px;
        }
        .cert-footer-line {
            width: 180px; height: 1.5px;
            background: linear-gradient(90deg, transparent, #b8860b, transparent);
            margin: 0 auto 4px;
        }
        .cert-footer-label { font-size: 12px; color: #999; letter-spacing: 2px; }

        /* 認證印章 — 重新設計 */
        .cert-seal {
            position: absolute; top: 40px; left: 50px;
            width: 110px; height: 110px;
        }
        .cert-seal-ring {
            width: 100%; height: 100%;
            border: 3px solid #8b0000;
            border-radius: 50%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(255,255,255,0.85);
            transform: rotate(-12deg);
            box-shadow: 0 2px 12px rgba(139,0,0,0.15);
            position: relative;
        }
        .cert-seal-ring::before {
            content: ''; position: absolute; inset: 5px;
            border: 1.5px solid #8b0000; border-radius: 50%;
        }
        .cert-seal-ring::after {
            content: ''; position: absolute; inset: 9px;
            border: 1px dashed rgba(139,0,0,0.3); border-radius: 50%;
        }
        .seal-check { font-size: 24px; color: #8b0000; font-weight: 900; }
        .seal-org { font-size: 9px; color: #8b0000; font-weight: 700; letter-spacing: 1px; margin-top: 2px; }
        .seal-label { font-size: 11px; color: #8b0000; font-weight: 700; }

        .hidden { display: none !important; }

        /* ===== RWD ===== */
        @media (max-width: 1000px) {
            .certificate { transform: scale(0.7); transform-origin: top center; }
            .main-container { padding-top: 70px; }
        }
        @media (max-width: 600px) {
            .certificate { transform: scale(0.42); transform-origin: top center; }
            .quiz-section { padding: 32px 20px; }
        }
    </style>
</head>
<body>

<!-- 導航列 -->
<nav class="top-nav">
    <span class="nav-title">Day 1 測驗認證</span>
    <div class="nav-links">
        <a href="index.html">首頁</a>
        <a href="Part7_Pencil_AI設計工具.html">← Part 7</a>
    </div>
</nav>

<div class="main-container">

    <!-- ===== 測驗區 ===== -->
    <div id="quizSection" class="quiz-section">
        <div class="quiz-header">
            <h1>Day 1 課程認證測驗</h1>
            <p>題庫 20 題隨機抽 10 題，80 分以上即可獲得「倉勳科技學院」認證證書</p>
        </div>
        <div class="quiz-progress"><div class="quiz-progress-bar" id="progressBar"></div></div>
        <div id="quizContainer"></div>
        <div id="quizResult" class="result-section hidden"></div>
        <div class="btn-center">
            <button id="submitBtn" class="btn-gold" onclick="submitQuiz()">送出答案</button>
            <button id="retryBtn" class="btn-outline hidden" onclick="resetQuiz()">重新作答</button>
            <button id="certBtn" class="btn-green hidden" onclick="showCertForm()">取得認證證書 →</button>
        </div>
    </div>

    <!-- ===== 證書表單 ===== -->
    <div id="certFormSection" class="cert-form-section hidden">
        <h2>填寫證書資訊</h2>
        <div class="form-group">
            <label>姓名 *</label>
            <input type="text" id="recipientName" placeholder="請輸入您的姓名">
        </div>
        <div class="form-group">
            <label>單位（選填）</label>
            <input type="text" id="recipientOrg" placeholder="例如：XX 公司 / XX 學校">
        </div>
        <div class="btn-center" style="margin-top:24px;">
            <button class="btn-gold" onclick="generateCertificate()">生成證書</button>
        </div>
    </div>

    <!-- ===== 證書顯示 ===== -->
    <div id="certDisplaySection" class="cert-display-section hidden">
        <div class="certificate-wrapper">
            <div id="certificate" class="certificate">
                <!-- 防偽底紋（5 層疊加） -->
                <div class="cert-bg-base"></div>
                <div class="cert-guilloche"></div>
                <div class="cert-rosette"></div>
                <div class="cert-microtext"></div>
                <div class="cert-border-pattern"></div>

                <!-- 邊框層 -->
                <div class="cert-border-outer"></div>
                <div class="cert-border-inner"></div>
                <div class="cert-border-deco"></div>
                <div class="cert-top-band"></div>
                <div class="cert-bottom-band"></div>

var QUIZ_COUNT = 10;       // 每次抽幾題
var PASS_SCORE = 80;       // 及格分數
var activeQuestions = [];   // 本次抽到的題目
var userAnswers = [];
var quizSubmitted = false;

// Fisher-Yates 洗牌
function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
}

function initQuiz() {
    // 從 20 題中隨機抽 10 題
    activeQuestions = shuffle(questionBank).slice(0, QUIZ_COUNT);
    userAnswers = new Array(QUIZ_COUNT).fill(-1);
    quizSubmitted = false;
    updateProgress();

    var container = document.getElementById('quizContainer');
    container.innerHTML = '';

    activeQuestions.forEach(function(q, qi) {
        var div = document.createElement('div');
        div.className = 'quiz-question';
        div.id = 'q' + qi;
        var optionsHtml = q.options.map(function(opt, oi) {
            return '<label class="quiz-option" data-q="' + qi + '" data-o="' + oi + '" onclick="selectOption(' + qi + ',' + oi + ')">' +
                String.fromCharCode(65 + oi) + '. ' + opt + '</label>';
        }).join('');
        div.innerHTML = '<h4><span class="q-num">' + (qi + 1) + '</span>' + q.question + '</h4>' +
            '<div>' + optionsHtml + '</div>';
        container.appendChild(div);
    });
}

function selectOption(qi, oi) {
    if (quizSubmitted) return;
    userAnswers[qi] = oi;
    var opts = document.querySelectorAll('[data-q="' + qi + '"]');
    opts.forEach(function(el, idx) { el.classList.toggle('selected', idx === oi); });
    document.getElementById('q' + qi).classList.add('answered');
    updateProgress();
}

function updateProgress() {
    var answered = userAnswers.filter(function(a) { return a !== -1; }).length;
    var pct = (answered / QUIZ_COUNT) * 100;
    document.getElementById('progressBar').style.width = pct + '%';
}

function submitQuiz() {
    var unanswered = userAnswers.filter(function(a) { return a === -1; }).length;
    if (unanswered > 0) { alert('還有 ' + unanswered + ' 題未作答！'); return; }
    quizSubmitted = true;

    var correct = 0;
    activeQuestions.forEach(function(q, idx) {
        var isCorrect = userAnswers[idx] === q.answer;
        if (isCorrect) correct++;
        var opts = document.querySelectorAll('[data-q="' + idx + '"]');
        opts.forEach(function(el, oi) {
            el.classList.remove('selected');
            if (oi === q.answer) el.classList.add('correct');
            else if (oi === userAnswers[idx] && !isCorrect) el.classList.add('wrong');
        });
    });

    var score = Math.round(correct / QUIZ_COUNT * 100);
    var passed = score >= PASS_SCORE;

    var resultDiv = document.getElementById('quizResult');
    resultDiv.classList.remove('hidden');
    resultDiv.innerHTML = '<div class="result-score">' + score + ' <span style="font-size:36px;">分</span></div>' +
        (passed
            ? '<div class="result-pass">恭喜通過認證測驗！</div><p style="color:rgba(255,255,255,0.5);">答對 ' + correct + ' / ' + QUIZ_COUNT + ' 題</p>'
            : '<div class="result-fail">未通過（需 ' + PASS_SCORE + ' 分以上）</div><p style="color:rgba(255,255,255,0.5);">答對 ' + correct + ' / ' + QUIZ_COUNT + ' 題，請再接再厲！</p>'
        );

    document.getElementById('submitBtn').classList.add('hidden');
    document.getElementById('retryBtn').classList.remove('hidden');
    if (passed) document.getElementById('certBtn').classList.remove('hidden');
}

function resetQuiz() {
    document.getElementById('quizResult').classList.add('hidden');
    document.getElementById('submitBtn').classList.remove('hidden');
    document.getElementById('retryBtn').classList.add('hidden');
    document.getElementById('certBtn').classList.add('hidden');
    initQuiz();  // 重新洗牌抽題
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showCertForm() {
    document.getElementById('quizSection').classList.add('hidden');
    document.getElementById('certFormSection').classList.remove('hidden');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    document.getElementById('recipientName').focus();
}

function generateCertificate() {
    var name = document.getElementById('recipientName').value.trim();
    if (!name) { alert('請輸入姓名！'); return; }
    var org = document.getElementById('recipientOrg').value.trim();

    document.getElementById('certName').textContent = name;
    document.getElementById('certOrg').textContent = org ? '（' + org + '）' : '';

    var today = new Date();
    document.getElementById('certDate').textContent =
        today.getFullYear() + ' 年 ' + (today.getMonth() + 1) + ' 月 ' + today.getDate() + ' 日';

    // 生成證書編號
    var certId = 'SKILL-' + today.getFullYear() + '-' +
        String(today.getMonth() + 1).padStart(2, '0') +
        String(today.getDate()).padStart(2, '0') + '-' +
        Math.random().toString(36).substring(2, 7).toUpperCase();
    document.getElementById('certNumber').textContent = '證書編號：' + certId;

    document.getElementById('certFormSection').classList.add('hidden');
    document.getElementById('certDisplaySection').classList.remove('hidden');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function downloadCertificate() {
    var cert = document.getElementById('certificate');
    if (typeof html2canvas === 'undefined') {
        var script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        script.onload = function() { captureAndDownload(cert); };
        document.head.appendChild(script);
    } else {
        captureAndDownload(cert);
    }
}

function captureAndDownload(el) {
    html2canvas(el, { scale: 2, backgroundColor: '#fefcf3', useCORS: true }).then(function(canvas) {
        var link = document.createElement('a');
        link.download = 'AI_Skill_認證證書.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
}

// 初始化
document.addEventListener('DOMContentLoaded', function() { initQuiz(); });
